---

# Handlers main file for airflow role

- name: 'Restart airflow'
  become: true
  ansible.builtin.service:
    name: "{{ item.name }}"
    state: 'restarted'
  with_items: "{{ airflow_services_states }}"
  when:
    - "item.managed | default(true) | bool"
    - "item.state == 'started'"
  tags:
    - 'role::airflow'
    - 'role::airflow::config'
    - 'role::airflow::install'


